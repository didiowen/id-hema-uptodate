# Twitter search queries for breast cancer content
# Used by: fetcher.py
# Each query is passed to the Twitter search API.
# Tips:
#   - Keep each query focused on one therapeutic area
#   - "lang:en" limits to English tweets
#   - OR groups multiple synonyms
#   - Twitter search supports quoted phrases

search_queries:
  - "(CMV OR Maribavir OR Letermovir) (transplant OR SOT OR HSCT)"
  - "(Candida auris OR Carbapenem resistance OR CRE) (outbreak OR clinical trial)"
  - "(One Health OR Zoonosis OR H5N1) (surveillance OR spillover)"
  - "(Aspergillosis OR Mucormycosis) (transplant OR resistance)"
  - "(IDWeek OR ESCMID) (AMR OR transplant OR EID)"
