# Drug / target group definitions for tweet and article classification
# Used by: reporter.py (trend aggregation)
# Format: group_name: [keyword, ...]  (case-insensitive matching)
drug_groups:
# --- CRE & MDR-Gram-Negative ---
  Anti_CRE_MDR_GNB:
    - Cefiderocol          # Fetroja
    - Ceftazidime-avibactam # Zavicefta (台灣已核准)
    - Meropenem-vaborbactam # Vabomere
    - Imipenem-relebactam   # Recarbrio
    - Eravacycline         # Xerava
    - Plazomicin           # Zemdri
    - Sulbactam-durlobactam # Xacduro (針對 Acinetobacter)
  # --- MRSA & Anti-Gram-Positive ---
  Anti_MRSA_VRE:
    - Ceftaroline          # Zinforo (第五代頭孢菌素，具備 MRSA 活性)
    - Tedizolid            # Sivextro
    - Delafloxacin         # Baxdela
    - Dalbavancin          # Dalvance
    - Oritavancin          # Orbactiv
    - Lefamulin            # Xenleta
  CMV_Therapies:
    - Letermovir
    - Maribavir
    - Valganciclovir
  Antifungals:
    - isavuconazole
    - voriconazole
    - amphotericin
    - rezafungin
    - Cresemba
    - Rezzayo
    - Ibrexafungerp

conference_keywords:
  - ESCMID
  - ESCMID Global
  - ECCMID
  - IDWeek
  - CROI
  - IAS
  - AST
  - EHA
  - abstract
  - conference
  - congress
